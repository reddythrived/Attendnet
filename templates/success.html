<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Complete | AttendNet</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --primary: #10b981;
            --primary-dark: #059669;
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #064e3b 100%);
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Outfit', sans-serif;
        }

        body {
            min-height: 100vh;
            background: var(--bg-gradient);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-main);
        }

        .container {
            width: 100%;
            max-width: 450px;
            padding: 20px;
            text-align: center;
            animation: slideUp 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 32px;
            padding: 48px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .icon-box {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 32px;
            font-size: 40px;
            box-shadow: 0 10px 20px rgba(16, 185, 129, 0.3);
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 12px;
        }

        .message {
            color: var(--text-dim);
            font-size: 1rem;
            margin-bottom: 32px;
            line-height: 1.6;
        }

        .details-list {
            text-align: left;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 24px;
            margin-bottom: 32px;
        }

        .detail-item {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid var(--glass-border);
        }

        .detail-item:last-child {
            border-bottom: none;
        }

        .label {
            color: var(--text-dim);
            font-size: 0.85rem;
            font-weight: 500;
        }

        .value {
            color: white;
            font-weight: 600;
            font-size: 0.9rem;
        }

        .btn {
            display: block;
            width: 100%;
            background: white;
            color: #0f172a;
            border: none;
            border-radius: 16px;
            padding: 16px;
            font-size: 1rem;
            font-weight: 700;
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(255, 255, 255, 0.1);
            filter: brightness(1.1);
        }

        .btn:active {
            transform: translateY(0);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="icon-box">✅</div>
            <h1>Perfectly Registered!</h1>
            <p class="message">Welcome to AttendNet. Your face ID has been securely encrypted and stored.</p>
            
            <div class="details-list">
                <div class="detail-item">
                    <span class="label">Name</span>
                    <span class="value">{{ name }}</span>
                </div>
                <div class="detail-item">
                    <span class="label">USN</span>
                    <span class="value">{{ reg_no }}</span>
                </div>
                <div class="detail-item">
                    <span class="label">Status</span>
                    <span class="value" style="color: var(--primary)">Cloud Synced</span>
                </div>
            </div>

            <a href="/" class="btn">Register Another Student</a>
        </div>
    </div>

    <script>
        // Trigger confetti on load
        window.onload = function() {
            confetti({
                particleCount: 150,
                spread: 70,
                origin: { y: 0.6 },
                colors: ['#10b981', '#34d399', '#6ee7b7', '#ffffff']
            });
        };
    </script>
</body>
</html>
